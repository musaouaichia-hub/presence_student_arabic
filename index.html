<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الحضور - QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --bg: #0a0e1a; --surface: #111827; --card: #1a2235; --border: #2a3548;
  --accent: #1d6fa4; --gold: #f0a500; --green: #10b981; --red: #ef4444;
  --blue: #3b82f6; --text: #f1f5f9; --text-muted: #64748b; --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; direction: rtl; }

.page { display: none; min-height: 100vh; flex-direction: column; }
.page.active { display: flex; }

/* DESIGN ELEMENTS (ORBS) */
#page-landing { background: var(--bg); align-items: center; justify-content: center; padding: 40px 24px; position: relative; overflow: hidden; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
.orb1 { width: 280px; height: 280px; background: rgba(29,111,164,0.2); top: -80px; left: -60px; }
.orb2 { width: 200px; height: 200px; background: rgba(240,165,0,0.12); bottom: 100px; right: -40px; }

.landing-title { font-family: 'Cairo', sans-serif; font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 30px; }
.landing-title span { color: var(--gold); }

.land-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
.land-btn-student { background: linear-gradient(135deg, var(--gold), #e09000); color: #0a0e1a; }
.land-btn-admin { background: var(--card); color: var(--text); border: 1px solid var(--border); }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin: 15px; }
input { width: 100%; padding: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: white; margin-top: 10px; text-align: center; }

.slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
.slot-btn { padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; }
.slot-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.submit-btn { width: 100%; padding: 17px; background: var(--gold); color: #0a0e1a; border: none; border-radius: 14px; font-weight: 900; font-size: 17px; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>

<div class="page active" id="page-landing">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="landing-title">نظام <span>الحضور</span> <br> <small style="font-size:14px; color:var(--text-muted)">1447 / 2026</small></div>
    <div id="display-date" style="margin-bottom:20px; color:var(--gold)">📅 جاري التحميل...</div>
    <button class="land-btn land-btn-student" onclick="showPage('page-student')">📱 تسجيل حضور طالب</button>
    <button class="land-btn land-btn-admin" onclick="showPage('page-admin-login')">🔐 فضاء الأستاذ</button>
</div>

<div class="page" id="page-student">
    <div class="card">
        <h2 style="text-align:center; margin-bottom:15px">تسجيل الحضور</h2>
        <label>اللقب (Nom)</label><input type="text" id="s-nom">
        <br><br>
        <label>الاسم (Prénom)</label><input type="text" id="s-prenom">
    </div>
    <div class="card">
        <div class="slot-grid">
            <button class="slot-btn" id="btn-m" onclick="toggleSlot('m')">☀️ الصباح</button>
            <button class="slot-btn" id="btn-e" onclick="toggleSlot('e')">🌙 المساء</button>
        </div>
        <button class="submit-btn" onclick="submitPresence()">تأكيد الحضور ✅</button>
    </div>
</div>

<div class="page" id="page-admin-login">
    <div class="card" style="margin-top:100px">
        <h2 style="text-align:center">دخول الأستاذ</h2>
        <input type="password" id="admin-pwd" placeholder="كلمة المرور">
        <button class="submit-btn" onclick="doLogin()">دخول 🔓</button>
    </div>
</div>

<div class="page" id="page-admin">
    <div class="card">
        <h3>قائمة الحضور</h3>
        <div id="admin-list" style="margin-top:15px; max-height:400px; overflow-y:auto"></div>
        <button class="submit-btn" style="background:var(--green)" onclick="exportCSV()">تصدير Excel ⬇️</button>
        <button class="submit-btn" style="background:var(--red)" onclick="clearAll()">مسح الكل 🗑️</button>
    </div>
</div>

<script>
let selM = false; let selE = false;
const today = new Date().toLocaleDateString('ar-DZ', {day:'numeric', month:'long', year:'numeric'});
document.getElementById('display-date').innerText = "📅 اليوم: " + today;

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function toggleSlot(t) {
    if(t==='m'){ selM=!selM; document.getElementById('btn-m').classList.toggle('active'); }
    if(t==='e'){ selE=!selE; document.getElementById('btn-e').classList.toggle('active'); }
}

function submitPresence() {
    const n = document.getElementById('s-nom').value;
    const p = document.getElementById('s-prenom').value;
    if(!n || !p) return alert("المرجو ملء البيانات");
    let db = JSON.parse(localStorage.getItem('presence_db') || '[]');
    db.push({nom:n, prenom:p, m:selM?'حاضر':'غائب', e:selE?'حاضر':'غائب', d:today});
    localStorage.setItem('presence_db', JSON.stringify(db));
    alert("تم التسجيل بنجاح");
    location.reload();
}

function doLogin() {
    if(document.getElementById('admin-pwd').value === 'prof2024') {
        loadAdmin(); showPage('page-admin');
    } else { alert("خطأ!"); }
}

function loadAdmin() {
    let db = JSON.parse(localStorage.getItem('presence_db') || '[]');
    let h = "";
    db.reverse().forEach(r => {
        h += `<div style="border-bottom:1px solid var(--border); padding:10px; font-size:13px">
              <b>${r.nom} ${r.prenom}</b> | ص: ${r.m} | م: ${r.e} <br><small>${r.d}</small></div>`;
    });
    document.getElementById('admin-list').innerHTML = h || "لا يوجد مسجلين";
}

function exportCSV() {
    let db = JSON.parse(localStorage.getItem('presence_db') || '[]');
    let csv = "\ufeffNom,Prenom,Matin,Soir,Date\n";
    db.forEach(r => { csv += `${r.nom},${r.prenom},${r.m},${r.e},${r.d}\n`; });
    let blob = new Blob([csv], {type:'text/csv'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a'); a.href=url; a.download='presence.csv'; a.click();
}

function clearAll() {
    if(confirm("مسح الكل؟")) { localStorage.removeItem('presence_db'); loadAdmin(); }
}
</script>
</body>
</html>
